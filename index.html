<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Judd Cashflow</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #08090d;
  --s1:      #0f1117;
  --s2:      #161920;
  --s3:      #1c202a;
  --border:  #252b38;
  --border2: #1a1f2a;
  --text:    #dde1ea;
  --dim:     #5a6275;
  --dim2:    #3c4357;
  --green:   #4ade80;
  --red:     #f87171;
  --accent:  #7c83fd;
  --acc-dim: #7c83fd18;
}

html, body { height: 100%; }
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* ── Layout ── */
#app { min-height: 100vh; }
.page-wrap { max-width: 920px; margin: 0 auto; padding: 36px 20px 100px; }

/* ── Typography helpers ── */
.serif { font-family: 'Instrument Serif', serif; }
.mono  { font-family: 'DM Mono', monospace; }
.label {
  font-size: 10px; font-weight: 600;
  letter-spacing: .12em; text-transform: uppercase; color: var(--dim);
}
.eyebrow {
  font-size: 10px; font-weight: 600;
  letter-spacing: .16em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 10px;
}

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px 22px; border-radius: 9px; border: none; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
  transition: opacity .15s, background .15s;
}
.btn:hover { opacity: .85; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-ghost {
  background: var(--s1); border: 1px solid var(--border); color: var(--dim);
}
.btn-ghost:hover { color: var(--text); opacity: 1; background: var(--s2); }

/* ── Input ── */
.input {
  width: 100%; background: var(--s2); border: 1px solid var(--border);
  border-radius: 9px; color: var(--text); font-family: 'DM Mono', monospace;
  font-size: 13px; padding: 11px 14px; outline: none;
  transition: border-color .15s;
}
.input:focus { border-color: var(--accent); }
.input::placeholder { color: var(--dim2); }

/* ══════════════════════════════════════
   ONBOARDING (API key + instructions)
══════════════════════════════════════ */
.onboard-wrap {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 40px 20px; gap: 0;
}
.onboard-card {
  width: 100%; max-width: 460px;
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 20px; padding: 36px 32px;
}
.onboard-title {
  font-family: 'Instrument Serif', serif;
  font-size: 30px; line-height: 1.15; margin-bottom: 8px;
}
.onboard-sub { color: var(--dim); font-size: 14px; margin-bottom: 28px; line-height: 1.6; }
.field-label { font-size: 12px; font-weight: 500; margin-bottom: 6px; color: var(--dim); }
.key-hint {
  margin-top: 10px; font-size: 12px; color: var(--dim2); line-height: 1.6;
}
.key-hint a { color: var(--accent); text-decoration: none; }
.key-hint a:hover { text-decoration: underline; }
.onboard-footer { margin-top: 18px; padding-top: 18px; border-top: 1px solid var(--border2); }
.cost-note {
  font-size: 12px; color: var(--dim); background: var(--s2);
  border-radius: 8px; padding: 10px 14px; line-height: 1.6;
}
.cost-note strong { color: var(--text); }

/* ══════════════════════════════════════
   UPLOAD
══════════════════════════════════════ */
.upload-wrap {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 40px 20px;
}
.upload-heading {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(32px, 6vw, 52px); line-height: 1.1;
  margin-bottom: 10px; text-align: center;
}
.upload-sub { color: var(--dim); font-size: 15px; text-align: center; max-width: 360px; margin-bottom: 36px; line-height: 1.6; }

.dropzone {
  width: 100%; max-width: 480px;
  background: var(--s1); border: 2px dashed var(--border);
  border-radius: 20px; padding: 48px 32px;
  text-align: center; cursor: pointer;
  transition: border-color .2s, background .2s;
  position: relative;
}
.dropzone:hover, .dropzone.drag {
  border-color: var(--accent); background: var(--s2);
}
.dropzone-icon { font-size: 40px; margin-bottom: 14px; line-height: 1; }
.dropzone-title { font-weight: 500; font-size: 16px; margin-bottom: 5px; }
.dropzone-hint { color: var(--dim); font-size: 13px; margin-bottom: 20px; }
.chip-row { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
.chip {
  background: var(--s2); border: 1px solid var(--border);
  color: var(--dim); font-size: 11px; font-weight: 500;
  padding: 3px 12px; border-radius: 99px;
}
.err-banner {
  margin-top: 16px; max-width: 480px;
  background: #1c0a0a; border: 1px solid #4a1515;
  border-radius: 10px; padding: 12px 16px;
  font-size: 13px; color: #f87171; line-height: 1.55;
}
.cached-note {
  margin-top: 20px; max-width: 480px; text-align: center;
  font-size: 13px; color: var(--dim); display: flex; align-items: center; gap: 8px;
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 18px;
}
.cached-note button {
  background: none; border: none; color: var(--accent);
  cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif;
  text-decoration: underline; text-underline-offset: 2px; padding: 0;
  white-space: nowrap;
}

/* ══════════════════════════════════════
   PROCESSING
══════════════════════════════════════ */
.proc-wrap {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 24px; padding: 40px;
}
.proc-icon { font-size: 40px; animation: pulse 1.8s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.4;} }
.proc-title { font-weight: 600; font-size: 18px; margin-bottom: 4px; text-align: center; }
.proc-sub { color: var(--dim); font-size: 14px; text-align: center; }
.prog-track { width: 260px; height: 4px; background: var(--s2); border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width .35s ease; }
.proc-pct { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--dim); }

/* ══════════════════════════════════════
   DASHBOARD
══════════════════════════════════════ */
.dash-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 28px; gap: 12px;
}
.dash-title { font-family: 'Instrument Serif', serif; font-size: 26px; line-height: 1.2; }
.dash-actions { display: flex; gap: 8px; flex-shrink: 0; }

/* Week nav */
.week-nav {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 18px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.nav-btn {
  background: none; border: none; cursor: pointer; color: var(--text);
  font-size: 20px; padding: 2px 10px; line-height: 1;
  transition: opacity .15s; font-family: inherit;
}
.nav-btn:disabled { opacity: .2; cursor: default; }
.week-range { font-weight: 500; font-size: 15px; margin-bottom: 2px; }
.week-meta { font-size: 12px; color: var(--dim); }

/* Summary row */
.summary-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 22px; }
.s-card {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 18px;
}
.s-label { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
.s-val { font-family: 'DM Mono', monospace; font-size: clamp(14px,3.5vw,21px); font-weight: 500; }

/* Category grid */
.cats-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(265px, 1fr));
  gap: 8px; margin-bottom: 20px;
}
.cat-card {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 11px; padding: 14px 16px;
  cursor: pointer; transition: background .15s, border-color .15s;
  user-select: none;
}
.cat-card:hover { background: var(--s2); }
.cat-card.active { background: var(--s2); border-color: var(--active-color, var(--accent)); }
.cat-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; }
.cat-left { display: flex; align-items: center; gap: 7px; }
.cat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.cat-name { font-weight: 500; font-size: 13px; }
.cat-right { display: flex; align-items: center; gap: 5px; }
.cat-spent { font-family: 'DM Mono', monospace; font-size: 13px; }
.budget-edit-btn {
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--dim); background: none; border: none; cursor: pointer;
  text-decoration: underline dotted; text-underline-offset: 2px; padding: 0;
  transition: color .15s;
}
.budget-edit-btn:hover { color: var(--text); }
.budget-inline-input {
  width: 60px; background: var(--s3); border: 1px solid var(--accent);
  border-radius: 4px; color: var(--text); font-family: 'DM Mono', monospace;
  font-size: 12px; padding: 2px 6px; outline: none;
}
.track { height: 4px; background: var(--s3); border-radius: 99px; overflow: hidden; }
.track-fill { height: 100%; border-radius: 99px; transition: width .4s cubic-bezier(.22,1,.36,1); }
.over-badge {
  display: inline-block; font-size: 10px; font-weight: 600;
  background: #1c0505; border: 1px solid #4a1010; color: var(--red);
  padding: 1px 7px; border-radius: 99px; margin-left: 4px;
}

/* Transaction panel */
.txn-panel {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden; margin-bottom: 16px;
  animation: slideIn .2s ease;
}
@keyframes slideIn { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:none;} }
.txn-ph { padding: 14px 20px; border-bottom: 1px solid var(--border2); display: flex; justify-content: space-between; align-items: center; }
.txn-ph-title { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 14px; }
.txn-count { font-size: 12px; color: var(--dim); }
.txn-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 11px 20px; border-bottom: 1px solid var(--border2);
}
.txn-row:last-child { border-bottom: none; }
.txn-desc { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 360px; }
.txn-date { font-size: 11px; color: var(--dim); margin-top: 2px; }
.txn-amt { font-family: 'DM Mono', monospace; font-size: 13px; white-space: nowrap; padding-left: 16px; }
.empty-state { padding: 40px; text-align: center; color: var(--dim); font-size: 14px; }

/* Settings panel */
.settings-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 16px; border-top: 1px solid var(--border2); margin-top: 8px;
}
.settings-bar span { font-size: 13px; color: var(--dim); }

/* Re-categorise */
.recat-btn {
  background: none; border: none; cursor: pointer; padding: 2px 6px;
  border-radius: 4px; font-size: 11px; color: var(--dim2);
  transition: color .15s, background .15s; white-space: nowrap; flex-shrink: 0;
}
.recat-btn:hover { color: var(--text); background: var(--s3); }
.recat-dropdown {
  position: fixed; z-index: 100;
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 10px; padding: 6px; min-width: 200px;
  box-shadow: 0 8px 32px #00000055;
  animation: slideIn .15s ease;
}
.recat-option {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: 6px; cursor: pointer;
  font-size: 13px; transition: background .1s;
}
.recat-option:hover { background: var(--s2); }
.recat-option.current { color: var(--accent); }
.rule-save-bar {
  background: var(--s2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 16px; margin-top: 6px;
  animation: slideIn .15s ease;
}
.rule-save-bar p { font-size: 12px; color: var(--dim); margin-bottom: 8px; }
.rule-save-row { display: flex; gap: 6px; align-items: center; }
.rule-kw-input {
  flex: 1; background: var(--s3); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-family: 'DM Mono', monospace;
  font-size: 12px; padding: 5px 8px; outline: none;
  transition: border-color .15s;
}
.rule-kw-input:focus { border-color: var(--accent); }
.btn-xs {
  padding: 5px 12px; border-radius: 6px; font-size: 12px;
  font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; border: none;
  transition: opacity .15s;
}
.btn-xs:hover { opacity: .8; }
.btn-xs-primary { background: var(--accent); color: #fff; }
.btn-xs-ghost { background: var(--s3); color: var(--dim); }

/* Account picker */
.account-picker { display:flex; flex-direction:column; gap:6px; margin-bottom:4px; }
.account-option {
  display:flex; align-items:center; justify-content:space-between;
  padding:11px 14px; border-radius:9px; cursor:pointer;
  background:var(--s2); border:1px solid var(--border);
  transition:border-color .15s, background .15s;
}
.account-option:hover { background:var(--s3); border-color:var(--dim2); }
.account-option.selected { border-color:var(--accent); background:var(--acc-dim); }
.account-option-label { font-weight:500; font-size:14px; }
.account-option-bank { font-size:11px; color:var(--dim); font-family:'DM Mono',monospace; background:var(--s3); padding:2px 7px; border-radius:4px; }

/* Responsive */
@media (max-width: 600px) {
  .page-wrap { padding: 20px 12px 80px; }
  .summary-row { grid-template-columns: 1fr 1fr; }
  .summary-row .s-card:last-child { grid-column: 1/-1; }
  .cats-grid { grid-template-columns: 1fr; }
  .onboard-card { padding: 28px 18px; }
  .dash-header { flex-direction: column; gap: 10px; }
  .dash-actions { width: 100%; justify-content: flex-end; }
  .week-nav { padding: 12px 10px; }
  .txn-desc { max-width: 200px; }
  .recat-btn { font-size: 10px; padding: 2px 4px; }
  .s-val { font-size: 16px !important; }
}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ════════════════════════════════════════════
//   CONFIG
// ════════════════════════════════════════════
const CATS = [
  { name:"Income",             isIncome:true,   isTransfer:false, color:"#4ade80", budget:null,  freq:'monthly'   },
  { name:"Mortgage",           isIncome:false,  isTransfer:false, color:"#38bdf8", budget:3000,  freq:'monthly'   },
  { name:"Groceries",          isIncome:false,  isTransfer:false, color:"#60a5fa", budget:800,   freq:'monthly'   },
  { name:"Dining & Takeaway",  isIncome:false,  isTransfer:false, color:"#f472b6", budget:400,   freq:'monthly'   },
  { name:"Transport",          isIncome:false,  isTransfer:false, color:"#a78bfa", budget:300,   freq:'monthly'   },
  { name:"Utilities & Bills",  isIncome:false,  isTransfer:false, color:"#fbbf24", budget:250,   freq:'monthly'   },
  { name:"Strata Fees",        isIncome:false,  isTransfer:false, color:"#fb923c", budget:3000,  freq:'quarterly' },
  { name:"Insurance",          isIncome:false,  isTransfer:false, color:"#c084fc", budget:1200,  freq:'quarterly' },
  { name:"Medical",            isIncome:false,  isTransfer:false, color:"#fb7185", budget:200,   freq:'monthly'   },
  { name:"Subscriptions",      isIncome:false,  isTransfer:false, color:"#34d399", budget:150,   freq:'monthly'   },
  { name:"Health & Fitness",   isIncome:false,  isTransfer:false, color:"#f97316", budget:250,   freq:'monthly'   },
  { name:"Shopping",           isIncome:false,  isTransfer:false, color:"#e879f9", budget:600,   freq:'monthly'   },
  { name:"Entertainment",      isIncome:false,  isTransfer:false, color:"#818cf8", budget:300,   freq:'monthly'   },
  { name:"Other",              isIncome:false,  isTransfer:false, color:"#94a3b8", budget:400,   freq:'monthly'   },
  { name:"Internal Transfers", isIncome:false,  isTransfer:true,  color:"#64748b", budget:null,  freq:'monthly'   },
];
const CAT_NAMES = CATS.map(c => c.name);
const CAT_MAP   = Object.fromEntries(CATS.map(c => [c.name, c]));

// ── Paste your Apps Script Web App URL here after setup ──
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyPR2B7We_JFQXiBIJCGHb1Crft0YO69qoMmZ-ISOL3QWJeJIzNm6F58cqdKOpG_ORkGQ/exec';
// ─────────────────────────────────────────────────────────

const LS = {
  BUDGETS: 'cf_budgets',
  FREQS:   'cf_freqs',
};

const FREQ_DIVISOR = { monthly: 1, quarterly: 3, annually: 12 };
const FREQ_LABEL   = { monthly: '/mo', quarterly: '/qtr', annually: '/yr' };

function defaultBudgets() {
  return Object.fromEntries(CATS.filter(c=>!c.isIncome&&!c.isTransfer).map(c=>[c.name,c.budget]));
}
function defaultFreqs() {
  return Object.fromEntries(CATS.filter(c=>!c.isIncome&&!c.isTransfer).map(c=>[c.name,c.freq||'monthly']));
}

// Monthly equivalent budget for bar calculation
function monthlyBudget(catName) {
  const budget = state.budgets[catName];
  if(!budget) return null;
  const freq = state.freqs[catName] || 'monthly';
  return budget / FREQ_DIVISOR[freq];
}

// ── Apps Script API helper ────────────────────
async function api(action, body) {
  if(!SCRIPT_URL) throw new Error('SCRIPT_URL not set in the HTML file. Follow the setup instructions.');
  let resp;
  if(!body) {
    resp = await fetch(`${SCRIPT_URL}?action=${encodeURIComponent(action)}`);
  } else {
    resp = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action, ...body }),
    });
  }
  if(!resp.ok) throw new Error(`HTTP ${resp.status} from Apps Script`);
  const data = await resp.json();
  if(data.error) throw new Error(data.error);
  return data;
}

// ════════════════════════════════════════════
//   QUOTES
// ════════════════════════════════════════════
const QUOTES = [
  { text: "A budget is telling your money where to go instead of wondering where it went.", author: "Dave Ramsey" },
  { text: "Do not save what is left after spending, but spend what is left after saving.", author: "Warren Buffett" },
  { text: "It's not your salary that makes you rich, it's your spending habits.", author: "Charles A. Jaffe" },
  { text: "Wealth is not about having a lot of money; it's about having a lot of options.", author: "Chris Rock" },
  { text: "The secret to getting ahead is getting started.", author: "Mark Twain" },
  { text: "Financial freedom is available to those who learn about it and work for it.", author: "Robert Kiyosaki" },
  { text: "Beware of little expenses. A small leak will sink a great ship.", author: "Benjamin Franklin" },
  { text: "The habit of saving is itself an education.", author: "T.T. Munger" },
  { text: "You must gain control over your money or the lack of it will forever control you.", author: "Dave Ramsey" },
  { text: "An investment in knowledge pays the best interest.", author: "Benjamin Franklin" },
];

function randomQuote() {
  const q = QUOTES[Math.floor(Math.random() * QUOTES.length)];
  return `"${q.text}" — ${q.author}`;
}

// ── Change this to whatever password you want ──
const APP_PASSWORD = 'judd2026';
// ───────────────────────────────────────────────

// ════════════════════════════════════════════
//   AUTH
// ════════════════════════════════════════════
function isAuthed() {
  return sessionStorage.getItem('cf_auth') === '1';
}
function setAuthed() {
  sessionStorage.setItem('cf_auth', '1');
}

function renderPassword() {
  const wrap = el('div', {class:'onboard-wrap'});
  const card = el('div', {class:'onboard-card'});

  const q0 = QUOTES[Math.floor(Math.random() * QUOTES.length)];
  const quoteSub = el('p', {class:'onboard-sub'});
  quoteSub.innerHTML = `<em>"${q0.text}"</em><br><span style="font-size:12px;">${q0.author}</span>`;

  card.append(
    el('div', {class:'eyebrow', text:'Judd Cashflow'}),
    el('h1',  {class:'onboard-title serif', text:'Welcome back.'}),
    quoteSub,
  );

  const label = el('div', {class:'field-label', text:'Password'});
  const input = el('input', {class:'input', type:'password', placeholder:'••••••••'});
  const btn   = el('button', {class:'btn btn-primary', text:'Unlock →', style:'width:100%;margin-top:14px;'});
  const err   = el('div', {style:'color:var(--red);font-size:13px;margin-top:10px;display:none;', text:'Incorrect password.'});

  const attempt = () => {
    if(input.value === APP_PASSWORD) {
      setAuthed();
      loadFromSheet();
    } else {
      err.style.display = 'block';
      input.value = '';
      input.focus();
    }
  };

  btn.addEventListener('click', attempt);
  input.addEventListener('keydown', e => { if(e.key === 'Enter') attempt(); });

  card.append(label, input, err, btn);
  wrap.appendChild(card);
  setTimeout(() => input.focus(), 50);
  return wrap;
}

// ════════════════════════════════════════════
//   UTILS
// ════════════════════════════════════════════
function fmt(n, sign=false) {
  const s = Math.abs(n).toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2});
  return (sign ? (n<0?'−':'+') : '') + '$' + s;
}

function monthKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

function fmtMonth(key) {
  const [y, m] = key.split('-');
  const d = new Date(+y, +m-1, 1);
  return d.toLocaleDateString('en-AU', {month:'long', year:'numeric'});
}

// ════════════════════════════════════════════
//   CSV PARSER — NAB + CBA
// ════════════════════════════════════════════
function parseSeparatedRow(line, sep) {
  const f=[]; let cur='', inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){ if(inQ&&line[i+1]==='"'){cur+='"';i++;} else inQ=!inQ; }
    else if(c===sep&&!inQ){f.push(cur.trim());cur='';}
    else cur+=c;
  }
  f.push(cur.trim()); return f;
}

function parseDate(s) {
  s=(s||'').replace(/"/g,'').trim(); let m;
  const mo={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  // dd/mm/yyyy
  if((m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/))) return new Date(+m[3],+m[2]-1,+m[1]);
  // yyyy-mm-dd
  if((m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/)))       return new Date(+m[1],+m[2]-1,+m[3]);
  // dd Mon yyyy  (e.g. 28 Mar 2026)
  if((m=s.match(/^(\d{1,2})\s+([A-Za-z]{3})\s+(\d{4})$/))) return new Date(+m[3],mo[m[2]]??0,+m[1]);
  // dd Mon yy  (e.g. 28 Mar 26)  — NAB two-digit year
  if((m=s.match(/^(\d{1,2})\s+([A-Za-z]{3})\s+(\d{2})$/))) {
    const yr = +m[3] + (+m[3] >= 0 && +m[3] <= 50 ? 2000 : 1900);
    return new Date(yr, mo[m[2]]??0, +m[1]);
  }
  return null;
}

function parseCSV(text) {
  // Detect separator: count tabs vs commas in first line
  const firstLine = text.split(/\r?\n/)[0] || '';
  const tabs   = (firstLine.match(/\t/g)||[]).length;
  const commas = (firstLine.match(/,/g)||[]).length;
  const sep    = tabs > commas ? '\t' : ',';

  const lines = text.trim().split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2) throw new Error('CSV appears empty');

  const row0 = parseSeparatedRow(lines[0], sep);
  const lc   = row0.map(f=>f.toLowerCase().replace(/["']/g,'').trim());

  const hasHeader = lc.some(h=>['date','amount','description','narration','debit','credit','transaction'].some(k=>h.includes(k)));
  const start = hasHeader ? 1 : 0;

  let dC    = lc.findIndex(h=>h.includes('date'));            if(dC<0)  dC=0;
  let xC    = lc.findIndex(h=>h.includes('transaction details')||h.includes('narration')||h.includes('description')||h.includes('details')); if(xC<0) xC=2;
  let mnC   = lc.findIndex(h=>h.includes('merchant name'));
  let ttC   = lc.findIndex(h=>h==='transaction type'||h.includes('transaction type'));
  let acC   = lc.findIndex(h=>h.includes('account number')||h.includes('account no')||h==='account');
  // NAB's own category column — only pick it up when a header row exists and it's labelled 'category'
  let ncC   = hasHeader ? lc.findIndex(h=>h==='category') : -1;
  let aC    = lc.findIndex(h=>h==='amount'||(h.includes('amount')&&!h.includes('debit')&&!h.includes('credit'))); if(aC<0) aC=1;
  let dbC   = lc.findIndex(h=>h==='debit'||h==='debit amount');
  let crC   = lc.findIndex(h=>h==='credit'||h==='credit amount');

  const txns = [];
  for(let i=start;i<lines.length;i++){
    const row = parseSeparatedRow(lines[i], sep);
    if(row.length<2) continue;
    const date = parseDate(row[dC]);
    if(!date||isNaN(date)) continue;
    let amount;
    if(dbC>=0&&crC>=0){
      const d=parseFloat((row[dbC]||'').replace(/[,"$\s]/g,''))||0;
      const c=parseFloat((row[crC]||'').replace(/[,"$\s]/g,''))||0;
      amount = c>0 ? c : -d;
    } else {
      amount = parseFloat((row[aC]||'').replace(/[,"$\s]/g,''));
    }
    if(isNaN(amount)) continue;
    const details     = (row[xC]||'').replace(/"/g,'').trim();
    const merchant    = mnC>=0 ? (row[mnC]||'').replace(/"/g,'').trim() : '';
    const txnType     = ttC>=0 ? (row[ttC]||'').replace(/"/g,'').trim().toUpperCase() : '';
    const account     = acC>=0 ? (row[acC]||'').replace(/"/g,'').trim() : '';
    const nabCategory = ncC>=0 ? (row[ncC]||'').replace(/"/g,'').trim() : '';
    const desc = merchant && merchant !== details ? `${merchant} (${details})` : details || merchant;
    if(!desc) continue;
    txns.push({ id:i, date:date.toISOString(), amount, description:desc, txnType, account, nabCategory, category:null });
  }
  if(!txns.length) throw new Error('No valid transactions found. Check that your CSV has Date, Amount, and Description columns.');
  return txns;
}

function groupByMonth(txns) {
  const map={};
  for(const t of txns){
    const k = monthKey(new Date(t.date));
    if(!map[k]) map[k]={ monthKey:k, transactions:[] };
    map[k].transactions.push(t);
  }
  return Object.values(map).sort((a,b)=> b.monthKey.localeCompare(a.monthKey));
}

function mostRecentDate(txns) {
  if(!txns.length) return null;
  return txns.reduce((latest, t) =>
    new Date(t.date) > new Date(latest.date) ? t : latest
  ).date;
}

// ════════════════════════════════════════════
//   RULES ENGINE
// ════════════════════════════════════════════
function applyRules(txns) {
  // Returns txns with category pre-filled where a rule matches
  return txns.map(t => {
    if(t.category) return t; // already categorised
    const descLower = (t.description || '').toLowerCase();
    for(const rule of state.rules) {
      if(descLower.includes(rule.keyword.toLowerCase())) {
        return { ...t, category: rule.category, ruleApplied: rule.keyword };
      }
    }
    return t;
  });
}

function suggestKeyword(description) {
  // Extract a clean keyword from a raw bank description
  // Strip trailing location/state info, collapse whitespace, take first meaningful chunk
  return description
    .replace(/\s{2,}/g, ' ')           // collapse multiple spaces
    .replace(/\s+(NSW|VIC|QLD|WA|SA|TAS|ACT|NT|AUS|AU)\s*$/i, '') // strip trailing state
    .replace(/\s+\d{4,}\s*$/,'')       // strip trailing reference numbers
    .trim()
    .split(' ').slice(0, 3).join(' ')  // take first 3 words
    .toLowerCase();
}

// ════════════════════════════════════════════
//   CATEGORISATION (via Apps Script → OpenAI)
// ════════════════════════════════════════════
async function categoriseBatch(batch) {
  // Apply local rules first — only send unmatched to OpenAI
  const withRules = applyRules(batch);
  const needsAI   = withRules.filter(t => !t.category);

  if(needsAI.length === 0) return withRules;

  // Re-index for the API call
  const indexed = needsAI.map((t, i) => ({ ...t, _batchIdx: i }));
  const data    = await api('categorise', { batch: indexed, categories: CAT_NAMES, rules: state.rules });
  const res     = data.categories || [];

  // Merge AI results back
  let aiIdx = 0;
  return withRules.map(t => {
    if(t.category) return t; // rule already applied
    const found = res.find(x => x.i === aiIdx);
    aiIdx++;
    return { ...t, category: CAT_NAMES.includes(found?.cat) ? found.cat : 'Other' };
  });
}

// ════════════════════════════════════════════
//   EXPORT / IMPORT (JSON backup — still useful)
// ════════════════════════════════════════════
function exportData() {
  const allTxns = state.weeks.flatMap(w => w.transactions);
  if(!allTxns.length) return;
  const payload = {
    version: 2,
    exportedAt: new Date().toISOString(),
    lastFile: state.lastFile || '',
    budgets:  state.budgets,
    freqs:    state.freqs,
    transactions: allTxns,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `judd-cashflow-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(file) {
  if(!file?.name?.toLowerCase().endsWith('.json')) {
    state.error = 'Please select a cashflow backup .json file';
    render(); return;
  }
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const payload = JSON.parse(e.target.result);
      if(!payload.transactions || !Array.isArray(payload.transactions))
        throw new Error('Invalid backup — missing transactions array');
      state.budgets  = payload.budgets || defaultBudgets();
      state.freqs    = payload.freqs   || defaultFreqs();
      state.lastFile = payload.lastFile || 'imported backup';
      state.weeks    = groupByMonth(payload.transactions);
      state.wi = 0; state.selectedCat = null; state.error = null;
      state.stage = 'dashboard';
      render();
      // Push to sheet in background
      await api('saveTransactions', { transactions: payload.transactions, fileName: state.lastFile });
      await api('saveBudgets', { budgets: state.budgets, freqs: state.freqs });
    } catch(err) {
      state.error = 'Import failed: ' + err.message;
      render();
    }
  };
  reader.readAsText(file);
}

// ════════════════════════════════════════════
//   STATE
// ════════════════════════════════════════════
const state = {
  stage: 'loading',   // loading | setup-key | upload | label | processing | dashboard
  pendingFile: null,
  accountLabel: '',
  rules: [],
  accounts: [],       // [{ label, bank }] loaded from Accounts sheet
  savingsTarget: 2000,  // monthly savings target — editable inline
  weeks: [],
  wi: 0,
  budgets: {},
  freqs: {},
  editBudget: null,
  editBudgetVal: '',
  progress: { done:0, total:0 },
  error: null,
  dragging: false,
  selectedCat: null,
  lastFile: null,
};

async function loadFromSheet() {
  state.stage = 'loading'; state.error = null;
  render();
  try {
    const data = await api('getData');
    state.budgets       = Object.keys(data.budgets||{}).length  ? data.budgets  : defaultBudgets();
    state.freqs         = Object.keys(data.freqs||{}).length    ? data.freqs    : defaultFreqs();
    state.lastFile      = data.lastFile || null;
    state.rules         = data.rules    || [];
    state.accounts      = data.accounts || [];
    state.savingsTarget = data.savingsTarget != null ? data.savingsTarget : state.savingsTarget;
    if(!data.hasApiKey) { state.stage = 'setup-key'; render(); return; }
    if(data.transactions.length > 0) {
      state.weeks = groupByMonth(data.transactions);
      state.wi    = 0;
      state.stage = 'dashboard';
    } else {
      state.stage = 'upload';
    }
  } catch(e) {
    state.error = e.message;
    state.budgets = defaultBudgets();
    state.freqs   = defaultFreqs();
    state.stage = 'upload';
  }
  try { render(); } catch(e2) { console.error('render error:', e2); }
}

// Boot
(function init() {
  state.budgets = defaultBudgets();
  state.freqs   = defaultFreqs();
  if(isAuthed()) {
    state.stage = 'loading';
    render();
    loadFromSheet();
  } else {
    render();
  }
})();

// ════════════════════════════════════════════
//   RENDER
// ════════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  try {
    if(!isAuthed())                    { app.appendChild(renderPassword());  return; }
    if(state.stage==='loading')        { app.appendChild(renderLoading());   return; }
    if(state.stage==='setup-key')      { app.appendChild(renderSetupKey());  return; }
    if(state.stage==='upload')         { app.appendChild(renderUpload());    return; }
    if(state.stage==='label')          { app.appendChild(renderLabel());     return; }
    if(state.stage==='processing')     { app.appendChild(renderProcessing());return; }
    if(state.stage==='dashboard')        app.appendChild(renderDashboard());
  } catch(err) {
    const errWrap = document.createElement('div');
    errWrap.style.cssText = 'min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:16px;';
    errWrap.innerHTML = `
      <div style="font-size:32px">⚠️</div>
      <div style="font-weight:600;font-size:18px;color:#dde1ea;">Something went wrong</div>
      <div style="font-family:monospace;font-size:12px;color:#f87171;background:#1c0a0a;border:1px solid #4a1515;border-radius:10px;padding:14px 18px;max-width:520px;width:100%;word-break:break-all;">${err.message || err}</div>
      <button onclick="loadFromSheet()" style="background:#7c83fd;color:#fff;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:14px;">Reload</button>
    `;
    app.appendChild(errWrap);
  }
}

// ── Loading ───────────────────────────────────
function renderLoading() {
  const wrap = el('div',{class:'proc-wrap'});
  const spinner = el('div',{class:'proc-icon', text:'📊'});

}

// ── Setup: API key entry (first time only) ────
function renderSetupKey() {
  const wrap = el('div',{class:'onboard-wrap'});
  const card = el('div',{class:'onboard-card'});
  card.append(
    el('div',{class:'eyebrow', text:'Judd Cashflow'}),
    el('h1', {class:'onboard-title serif', text:'One-time setup.'}),
    el('p',  {class:'onboard-sub', text:'Enter your OpenAI API key. It will be stored securely in your Google Apps Script — no browser, no leaks.'}),
  );
  const label  = el('div',{class:'field-label', text:'OpenAI API Key'});
  const input  = el('input',{class:'input', type:'password', placeholder:'sk-proj-...'});
  const btn    = el('button',{class:'btn btn-primary', text:'Save & continue →', style:'width:100%;margin-top:14px;'});
  const err    = el('div',{style:'color:var(--red);font-size:13px;margin-top:10px;display:none;'});
  const hint   = el('div',{class:'key-hint'});
  hint.innerHTML = 'Get your key at <a href="https://platform.openai.com/api-keys" target="_blank">platform.openai.com/api-keys</a>. Your key is sent once to your private Apps Script and stored there — it never touches any browser again.';
  const cost   = el('div',{class:'cost-note', style:'margin-top:14px;'});
  cost.innerHTML = '💡 Uses <strong>gpt-4o-mini</strong> — categorising 200 transactions costs under <strong>$0.01 USD</strong>.';

  btn.addEventListener('click', async () => {
    const k = input.value.trim();
    if(!k || !k.startsWith('sk-')) { err.style.display='block'; err.textContent='Enter a valid key (starts with sk-)'; return; }
    err.style.display='none'; btn.textContent='Saving…'; btn.disabled=true;
    try {
      await api('setApiKey', { apiKey: k });
      state.stage='upload'; render();
    } catch(e) {
      err.style.display='block'; err.textContent=e.message;
      btn.textContent='Save & continue →'; btn.disabled=false;
    }
  });
  input.addEventListener('keydown', e => { if(e.key==='Enter') btn.click(); });
  card.append(label, input, err, btn, hint, cost);
  wrap.appendChild(card);
  setTimeout(() => input.focus(), 50);
  return wrap;
}

// ── Upload ────────────────────────────────────
function renderUpload() {
  const wrap = el('div',{class:'upload-wrap'});
  wrap.append(
    el('div',{class:'eyebrow',text:'Judd Cashflow', style:'text-align:center'}),
    el('h1',{class:'upload-heading serif', text:'Your money,\nmonth by month.'}),
    el('p',{class:'upload-sub', text:'Drop a CSV from NAB or Commonwealth Bank. Transactions are automatically categorised.'}),
  );

  const zone = el('div',{class:'dropzone'});
  const fileInput = el('input',{type:'file',accept:'.csv',style:'display:none'});
  zone.append(
    el('div',{class:'dropzone-icon',text:'📂'}),
    el('div',{class:'dropzone-title',text:'Drop your CSV here'}),
    el('div',{class:'dropzone-hint',text:'or click to browse'}),
    fileInput,
  );
  const chips = el('div',{class:'chip-row'});
  ['NAB','Commonwealth Bank'].forEach(b=>chips.appendChild(el('span',{class:'chip',text:b})));
  zone.appendChild(chips);

  zone.addEventListener('click',()=>fileInput.click());
  zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag');});
  zone.addEventListener('dragleave',()=>zone.classList.remove('drag'));
  zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('drag');selectFile(e.dataTransfer.files[0]);});
  fileInput.addEventListener('change',e=>selectFile(e.target.files[0]));
  wrap.appendChild(zone);

  if(state.error) {
    const err = el('div',{class:'err-banner',text:'⚠️ '+state.error});
    wrap.appendChild(err);
  }

  // Divider
  const divider = el('div',{style:'display:flex;align-items:center;gap:12px;width:100%;max-width:480px;margin-top:20px;'});
  divider.append(
    el('div',{style:'flex:1;height:1px;background:var(--border)'}),
    el('span',{style:'font-size:12px;color:var(--dim);white-space:nowrap;',text:'or restore from backup'}),
    el('div',{style:'flex:1;height:1px;background:var(--border)'}),
  );
  wrap.appendChild(divider);

  // Import area
  const importInput = el('input',{type:'file',accept:'.json',style:'display:none'});
  const importBtn = el('button',{class:'btn btn-ghost',style:'margin-top:12px;'});
  importBtn.innerHTML = '↓ Import backup <span style="font-size:11px;color:var(--dim2);margin-left:4px;">.json</span>';
  importBtn.addEventListener('click',()=>importInput.click());
  importInput.addEventListener('change',e=>importData(e.target.files[0]));
  wrap.append(importInput, importBtn);

  // Show cached data notice
  if(state.weeks.length && state.lastFile) {
    const note = el('div',{class:'cached-note'});
    note.innerHTML = `📁 <span>Last upload: <strong>${state.lastFile}</strong></span>`;
    const viewBtn = el('button',{text:'View →'});
    viewBtn.addEventListener('click',()=>{ state.stage='dashboard'; state.error=null; render(); });
    note.appendChild(viewBtn);
    wrap.appendChild(note);
  }

  // Footer links
  const footer = el('div',{style:'margin-top:20px;text-align:center;display:flex;gap:10px;justify-content:center;'});
  const setupBtn = el('button',{class:'btn btn-ghost',style:'font-size:12px;padding:6px 14px;',text:'⚙ Change API key'});
  setupBtn.addEventListener('click',()=>{ state.stage='setup-key'; render(); });
  const refreshBtn = el('button',{class:'btn btn-ghost',style:'font-size:12px;padding:6px 14px;',text:'↺ Reload from sheet'});
  refreshBtn.addEventListener('click',()=>loadFromSheet());
  footer.append(setupBtn, refreshBtn);
  wrap.appendChild(footer);

  return wrap;
}

function selectFile(file) {
  if(!file) return;
  if(!file.name.toLowerCase().endsWith('.csv')) { state.error='Please upload a .csv file'; render(); return; }
  state.error = null;
  state.pendingFile = file;
  state.accountLabel = '';
  state.stage = 'label';
  render();
}

// ── Label screen ──────────────────────────────
function renderLabel() {
  const file = state.pendingFile;
  const wrap = el('div',{class:'onboard-wrap'});
  const card = el('div',{class:'onboard-card'});

  card.append(
    el('div',{class:'eyebrow', text:'Judd Cashflow'}),
    el('h1', {class:'onboard-title serif', text:'Which account is this?'}),
    el('p',  {class:'onboard-sub', text:'Select the account this statement belongs to. Manage accounts in the Accounts tab of your Google Sheet.'}),
  );

  const fileNote = el('div',{style:'font-size:12px;color:var(--dim);background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;margin-bottom:18px;'});
  fileNote.innerHTML = `📄 <strong>${file?.name}</strong>`;
  card.appendChild(fileNote);

  const err  = el('div',{style:'color:var(--red);font-size:13px;margin-top:8px;display:none;', text:'Please select an account.'});
  const btn  = el('button',{class:'btn btn-primary', text:'Categorise transactions →', style:'width:100%;margin-top:14px;'});
  const back = el('button',{class:'btn btn-ghost', text:'← Back', style:'width:100%;margin-top:8px;'});

  let selected = state.accountLabel || '';

  // If accounts loaded from sheet, show picker; otherwise fall back to text input
  if(state.accounts.length > 0) {
    const picker = el('div',{class:'account-picker'});

    state.accounts.forEach(acc => {
      const opt = el('div',{class:'account-option' + (selected===acc.label ? ' selected' : '')});
      opt.append(
        el('span',{class:'account-option-label', text:acc.label}),
        el('span',{class:'account-option-bank',  text:acc.bank || ''})
      );
      opt.addEventListener('click', () => {
        selected = acc.label;
        picker.querySelectorAll('.account-option').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
      });
      picker.appendChild(opt);
    });

    const fieldLabel = el('div',{class:'field-label', style:'margin-bottom:8px;', text:'Select account'});
    card.append(fieldLabel, picker, err, btn, back);

  } else {
    // Fallback: text input (no accounts in sheet yet)
    const fieldLabel = el('div',{class:'field-label', text:'Account label'});
    const input = el('input',{class:'input', placeholder:'e.g. NAB Everyday, CBA Joint'});
    const nameLower = (file?.name||'').toLowerCase();
    if(nameLower.includes('nab'))        input.value = 'NAB Everyday';
    else if(nameLower.includes('cba'))   input.value = 'CBA Everyday';
    selected = input.value;
    input.addEventListener('input', e => { selected = e.target.value; });
    input.addEventListener('keydown', e => { if(e.key==='Enter') btn.click(); });
    card.append(fieldLabel, input, err, btn, back);
    setTimeout(()=>{ input.focus(); input.select(); }, 50);
  }

  btn.addEventListener('click', () => {
    if(!selected.trim()) { err.style.display='block'; return; }
    state.accountLabel = selected.trim();
    handleFile(state.pendingFile, state.accountLabel);
  });
  back.addEventListener('click', () => { state.stage='upload'; state.pendingFile=null; render(); });

  wrap.appendChild(card);
  return wrap;
}

async function handleFile(file, accountLabel='') {
  if(!file) return;
  if(!file.name.toLowerCase().endsWith('.csv')) { state.error='Please upload a .csv file'; render(); return; }
  state.error=null;

  let txns;
  try {
    const text = await file.text();
    txns = parseCSV(text);
    // Stamp account label onto every transaction
    // For NAB: label overrides the raw account number for display; raw number kept separately
    if(accountLabel) txns = txns.map(t => ({
      ...t,
      account: accountLabel,
      accountRaw: t.account || '', // preserve raw account number from file
    }));
  } catch(e) { state.error=e.message; render(); return; }

  state.stage='processing';
  const BATCH=25;
  const batches = Array.from({length:Math.ceil(txns.length/BATCH)},(_,i)=>txns.slice(i*BATCH,(i+1)*BATCH));
  state.progress={ done:0, total:batches.length };
  render();

  let all=[];
  try {
    for(let i=0;i<batches.length;i++){
      all=[...all,...(await categoriseBatch(batches[i]))];
      state.progress.done=i+1;
      render();
    }
  } catch(e) {
    state.error=e.message; state.stage='upload'; render(); return;
  }

  // Save to Google Sheet (append-only, server deduplicates)
  try {
    const result = await api('saveTransactions', { transactions: all, fileName: file.name });
    if(result.skipped > 0) console.info(`Dedup: ${result.added} added, ${result.skipped} skipped as duplicates`);
  } catch(e) {
    console.warn('Sheet save failed:', e.message);
  }

  // Merge into existing state (client-side dedup by same key)
  const existingTxns = state.weeks.flatMap(w => w.transactions);
  const existingKeys = new Set(existingTxns.map(t =>
    `${t.date}|${t.amount}|${String(t.description).trim().toLowerCase()}|${String(t.account).trim().toLowerCase()}`
  ));
  const newOnly = all.filter(t => {
    const key = `${t.date}|${t.amount}|${String(t.description).trim().toLowerCase()}|${String(t.account).trim().toLowerCase()}`;
    return !existingKeys.has(key);
  });
  const merged = [...existingTxns, ...newOnly];

  state.lastFile=file.name;
  state.weeks=groupByMonth(merged);
  state.wi=0; state.selectedCat=null;
  state.stage='dashboard'; render();
}

// ── Processing ────────────────────────────────
function renderProcessing() {
  const p=state.progress;
  const pct=p.total ? Math.round((p.done/p.total)*100) : 0;
  const wrap=el('div',{class:'proc-wrap'});
  wrap.append(
    el('div',{class:'proc-icon',text:'🤖'}),
    (() => { const d=el('div',{style:'text-align:center'}); d.append(el('div',{class:'proc-title',text:'Categorising your transactions'}),el('div',{class:'proc-sub',text:`Processing ${p.total*25} transactions with gpt-4o-mini...`})); return d; })(),
    (() => { const t=el('div',{class:'prog-track'}); const f=el('div',{class:'prog-fill',style:`width:${pct}%`}); t.appendChild(f); return t; })(),
    el('div',{class:'proc-pct mono',text:`${p.done} / ${p.total} batches · ${pct}%`}),
  );
  return wrap;
}

// ── Dashboard ─────────────────────────────────
function renderDashboard() {
  const wrap=el('div',{class:'page-wrap'});

  // Header
  const hdr=el('div',{class:'dash-header'});
  const hLeft=el('div');
  hLeft.append(el('div',{class:'eyebrow',text:'Judd Cashflow'}),el('div',{class:'dash-title serif',text:'Monthly Budget'}));
  const hRight=el('div',{class:'dash-actions'});
  const newBtn=el('button',{class:'btn btn-ghost',text:'↑ Upload new'});
  newBtn.addEventListener('click',()=>{ state.stage='upload'; state.selectedCat=null; render(); });
  hRight.append(newBtn);
  hdr.append(hLeft,hRight);
  wrap.appendChild(hdr);

  const month=state.weeks[state.wi];
  const txns=month?.transactions||[];

  // Most recent transaction date across ALL data
  const allTxns = state.weeks.flatMap(w=>w.transactions);
  const latestDate = mostRecentDate(allTxns);
  if(latestDate) {
    const upTo = el('div',{style:'font-size:12px;color:var(--dim);margin-bottom:10px;'});
    upTo.innerHTML = `Data up to <strong style="color:var(--text)">${new Date(latestDate).toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'long',year:'numeric'})}</strong>`;
    wrap.appendChild(upTo);
  }
  // Rotating quote
  const q = QUOTES[Math.floor(Math.random() * QUOTES.length)];
  const quoteEl = el('div',{style:'font-size:12px;color:var(--dim2);font-style:italic;margin-bottom:22px;max-width:520px;line-height:1.6;'});
  quoteEl.innerHTML = `"${q.text}" <span style="font-style:normal;color:var(--dim);"> — ${q.author}</span>`;
  wrap.appendChild(quoteEl);

  // Totals — Internal Transfers excluded from income and spend
  const totals=Object.fromEntries(CAT_NAMES.map(c=>[c,0]));
  for(const t of txns){
    const cat = t.category || 'Other';
    if(cat === 'Internal Transfers') { totals['Internal Transfers'] += Math.abs(t.amount); continue; }
    if(t.amount > 0) totals['Income'] += t.amount;
    else totals[cat] += Math.abs(t.amount);
  }
  const income = totals['Income'];
  const spend  = CATS.filter(c=>!c.isIncome&&!c.isTransfer).reduce((s,c)=>s+totals[c.name],0);
  const net    = income - spend;

  // Month nav
  const nav=el('div',{class:'week-nav'});
  const prev=el('button',{class:'nav-btn',text:'‹'});
  const next=el('button',{class:'nav-btn',text:'›'});
  prev.disabled=state.wi>=state.weeks.length-1;
  next.disabled=state.wi<=0;
  prev.addEventListener('click',()=>{ state.wi=Math.min(state.wi+1,state.weeks.length-1); state.selectedCat=null; render(); });
  next.addEventListener('click',()=>{ state.wi=Math.max(state.wi-1,0); state.selectedCat=null; render(); });
  const navMid=el('div',{style:'text-align:center'});
  navMid.append(
    el('div',{class:'week-range',text:month?fmtMonth(month.monthKey):''}),
    el('div',{class:'week-meta',text:`${txns.length} transactions · Month ${state.weeks.length-state.wi} of ${state.weeks.length}`})
  );
  nav.append(prev,navMid,next);
  wrap.appendChild(nav);

  // Summary
  const headroom = net - state.savingsTarget;
  const sumRow=el('div',{class:'summary-row', style:'grid-template-columns:repeat(2,1fr);'});

  // Income
  const incCard = el('div',{class:'s-card'});
  incCard.append(el('div',{class:'s-label',text:'Income'}), el('div',{class:'s-val mono',style:'color:var(--green)',text:fmt(income)}));
  sumRow.appendChild(incCard);

  // Spend
  const spCard = el('div',{class:'s-card'});
  spCard.append(el('div',{class:'s-label',text:'Spend'}), el('div',{class:'s-val mono',text:fmt(spend)}));
  sumRow.appendChild(spCard);

  // Net
  const netCard = el('div',{class:'s-card'});
  netCard.append(el('div',{class:'s-label',text:'Net'}), el('div',{class:'s-val mono',style:`color:${net>=0?'var(--green)':'var(--red)'}`,text:fmt(net,true)}));
  sumRow.appendChild(netCard);

  // Savings target — inline editable
  const tgtCard = el('div',{class:'s-card', style:'cursor:pointer;'});
  const tgtLabel = el('div',{class:'s-label',text:'Savings target'});
  if(state.editBudget==='__savings__') {
    const inp = el('input',{class:'budget-inline-input', style:'width:100%;font-size:16px;', value:String(state.editBudgetVal)});
    inp.addEventListener('input', e => state.editBudgetVal = e.target.value);
    inp.addEventListener('blur', commitSavingsTarget);
    inp.addEventListener('keydown', e => { if(e.key==='Enter') commitSavingsTarget(); if(e.key==='Escape'){state.editBudget=null;render();} });
    tgtCard.append(tgtLabel, inp);
    setTimeout(()=>inp.focus(),10);
  } else {
    const tgtVal = el('div',{class:'s-val mono',style:'color:var(--dim);',text:fmt(state.savingsTarget)});
    tgtCard.append(tgtLabel, tgtVal);
    tgtCard.addEventListener('click', () => { state.editBudget='__savings__'; state.editBudgetVal=String(state.savingsTarget); render(); });
  }
  sumRow.appendChild(tgtCard);

  // Headroom — how much more you can spend before eating into savings target
  const hrCard = el('div',{class:'s-card', style:'grid-column:1/-1;'});
  const hrLabel = el('div',{class:'s-label',text: headroom >= 0 ? 'Headroom to spend' : 'Over savings target by'});
  const hrVal   = el('div',{class:'s-val mono',style:`color:${headroom>=0?'var(--green)':'var(--red)'}`,text:fmt(Math.abs(headroom))});
  const hrSub   = el('div',{style:'font-size:11px;color:var(--dim);margin-top:4px;'});
  hrSub.textContent = headroom >= 0
    ? `You can spend ${fmt(headroom)} more this month and still hit your ${fmt(state.savingsTarget)} savings target.`
    : `You have spent ${fmt(Math.abs(headroom))} more than your ${fmt(state.savingsTarget)} savings target.`;
  hrCard.append(hrLabel, hrVal, hrSub);
  sumRow.appendChild(hrCard);

  wrap.appendChild(sumRow);

  // Category cards
  const grid=el('div',{class:'cats-grid'});
  CATS.forEach(cat=>{
    const spent=totals[cat.name];
    const budget=cat.isIncome?null:state.budgets[cat.name];
    const pct=budget?Math.min((spent/budget)*100,100):0;
    const over=budget&&spent>budget;
    const isActive=state.selectedCat===cat.name;

    const card=el('div',{class:'cat-card'+(isActive?' active':'')});
    if(isActive) card.style.setProperty('--active-color',cat.color);

    const top=el('div',{class:'cat-top'});
    const left=el('div',{class:'cat-left'});
    const dot=el('div',{class:'cat-dot',style:`background:${cat.color}`});
    left.append(dot,el('span',{class:'cat-name',text:cat.name}));

    const right=el('div',{class:'cat-right'});
    const spentEl=el('span',{class:'cat-spent',text:fmt(spent)});
    spentEl.style.color=cat.isIncome?'var(--green)':over?'var(--red)':'var(--text)';
    right.appendChild(spentEl);

    if(!cat.isIncome && !cat.isTransfer){
      if(over){
        const badge=el('span',{class:'over-badge',text:'over'});
        right.appendChild(badge);
      }

      if(state.editBudget===cat.name){
        const inp=el('input',{class:'budget-inline-input',value:state.editBudgetVal});
        inp.addEventListener('click',e=>e.stopPropagation());
        inp.addEventListener('input',e=>state.editBudgetVal=e.target.value);
        inp.addEventListener('blur',()=>commitBudget(cat.name));
        inp.addEventListener('keydown',e=>{
          if(e.key==='Enter') commitBudget(cat.name);
          if(e.key==='Escape'){state.editBudget=null;render();}
          e.stopPropagation();
        });
        right.appendChild(inp);
        setTimeout(()=>inp.focus(),10);
      } else {
        const editBtn=el('button',{class:'budget-edit-btn',text:'/ '+fmt(budget)});
        editBtn.addEventListener('click',e=>{
          e.stopPropagation();
          state.editBudget=cat.name;
          state.editBudgetVal=String(budget||0);
          render();
        });
        right.appendChild(editBtn);
      }
    }

    top.append(left,right);
    card.appendChild(top);

    if(!cat.isIncome && !cat.isTransfer){
      const track=el('div',{class:'track'});
      const fill=el('div',{class:'track-fill',style:`width:${pct}%;background:${over?'var(--red)':cat.color}`});
      track.appendChild(fill);
      card.appendChild(track);
    }

    card.addEventListener('click',()=>{
      state.selectedCat=state.selectedCat===cat.name?null:cat.name;
      render();
    });
    grid.appendChild(card);
  });
  wrap.appendChild(grid);

  // Transaction panel
  if(state.selectedCat){
    const cat=CAT_MAP[state.selectedCat];
    const catTxns=txns.filter(t=>{
      if(state.selectedCat==='Income') return t.amount>0 && t.category!=='Internal Transfers';
      if(state.selectedCat==='Internal Transfers') return t.category==='Internal Transfers';
      return t.category===state.selectedCat && t.amount<0;
    }).sort((a,b)=>new Date(b.date)-new Date(a.date));

    const panel=el('div',{class:'txn-panel'});
    const ph=el('div',{class:'txn-ph'});
    const title=el('div',{class:'txn-ph-title'});
    title.append(el('div',{class:'cat-dot',style:`background:${cat.color}`}),el('span',{text:state.selectedCat}));
    ph.append(title,el('span',{class:'txn-count',text:catTxns.length+' transactions'}));
    panel.appendChild(ph);

    if(!catTxns.length){
      panel.appendChild(el('div',{class:'empty-state',text:'No transactions in this category this month'}));
    } else {
      catTxns.forEach(t=>{
        const row = el('div',{class:'txn-row', style:'flex-direction:column;align-items:stretch;gap:0;padding:0;'});

        // Main row
        const mainRow = el('div',{style:'display:flex;justify-content:space-between;align-items:center;padding:11px 20px;'});
        const left = el('div',{style:'min-width:0;flex:1;'});
        const metaRow = el('div',{style:'display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap;'});
        metaRow.appendChild(el('div',{class:'txn-date',text:new Date(t.date).toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'})}));
        if(t.account) {
          const badge = el('span',{style:'font-size:10px;font-family:var(--mono,monospace);color:var(--dim2);background:var(--s3);border:1px solid var(--border2);border-radius:4px;padding:1px 5px;white-space:nowrap;'});
          badge.textContent = t.account;
          metaRow.appendChild(badge);
        }
        if(t.ruleApplied) {
          const rb = el('span',{style:'font-size:10px;color:var(--accent);background:var(--acc-dim);border-radius:4px;padding:1px 5px;'});
          rb.textContent = '⚡ rule';
          rb.title = 'Matched rule: ' + t.ruleApplied;
          metaRow.appendChild(rb);
        }
        left.append(el('div',{class:'txn-desc',text:t.description}), metaRow);

        const right = el('div',{style:'display:flex;align-items:center;gap:8px;padding-left:16px;flex-shrink:0;'});
        const amt = el('div',{class:'txn-amt',text:fmt(t.amount,true)});
        amt.style.color = t.amount>0 ? 'var(--green)' : 'var(--text)';

        const recatBtn = el('button',{class:'recat-btn',text:'✎ re-categorise'});
        recatBtn.addEventListener('click', e => {
          e.stopPropagation();
          showRecatDropdown(t, recatBtn, row);
        });
        right.append(amt, recatBtn);
        mainRow.append(left, right);
        row.appendChild(mainRow);
        panel.appendChild(row);
      });
    }
    wrap.appendChild(panel);
  }

  return wrap;
}

function showRecatDropdown(txn, anchor, rowEl) {
  document.querySelectorAll('.recat-dropdown').forEach(d => d.remove());
  document.querySelectorAll('.rule-save-bar').forEach(d => d.remove());

  const rect = anchor.getBoundingClientRect();
  const drop = el('div',{class:'recat-dropdown'});
  // Make scrollable so it never overflows
  drop.style.maxHeight = '320px';
  drop.style.overflowY = 'auto';
  drop.style.left = Math.min(rect.left, window.innerWidth - 224) + 'px';

  CATS.forEach(cat => {
    const opt = el('div',{class:'recat-option' + (cat.name === txn.category ? ' current' : '')});
    const dot = el('div',{class:'cat-dot', style:`background:${cat.color};flex-shrink:0;`});
    opt.append(dot, el('span',{text:cat.name}));
    if(cat.name === txn.category) opt.append(el('span',{style:'margin-left:auto;font-size:11px;color:var(--accent);',text:'current'}));
    opt.addEventListener('click', () => {
      drop.remove();
      if(cat.name === txn.category) return;
      applyRecategorise(txn, cat.name, rowEl);
    });
    drop.appendChild(opt);
  });

  // Append first to measure height, then position
  drop.style.visibility = 'hidden';
  document.body.appendChild(drop);
  const dropH = drop.offsetHeight;
  const spaceBelow = window.innerHeight - rect.bottom - 8;
  if(spaceBelow >= dropH) {
    drop.style.top = (rect.bottom + 6) + 'px';
  } else {
    // Flip above if more space there
    drop.style.top = Math.max(8, rect.top - dropH - 6) + 'px';
  }
  drop.style.visibility = '';

  const dismiss = e => { if(!drop.contains(e.target) && e.target !== anchor) { drop.remove(); document.removeEventListener('click', dismiss); }};
  setTimeout(() => document.addEventListener('click', dismiss), 10);
}

function applyRecategorise(txn, newCat, rowEl) {
  // Update in state
  const allTxns = state.weeks.flatMap(w => w.transactions);
  const t = allTxns.find(x => x.id === txn.id && x.date === txn.date);
  if(t) t.category = newCat;

  // Push to sheet (non-blocking)
  api('updateCategory', { id: txn.id, category: newCat }).catch(()=>{});

  // Re-render
  render();

  // Show rule save bar after a tick (render clears the DOM)
  setTimeout(() => showRuleSaveBar(txn, newCat), 50);
}

function showRuleSaveBar(txn, newCat) {
  // Find the transaction row in the freshly rendered DOM
  const panels = document.querySelectorAll('.txn-panel');
  if(!panels.length) return;
  const lastPanel = panels[panels.length - 1];

  const bar = el('div',{class:'rule-save-bar'});
  const suggested = suggestKeyword(txn.description);

  bar.innerHTML = `<p>💡 Save a rule so future <em>${newCat}</em> transactions are matched automatically?</p>`;

  const inputRow = el('div',{class:'rule-save-row'});
  const kw = el('input',{class:'rule-kw-input'});
  kw.value = suggested;
  kw.placeholder = 'keyword...';

  const saveBtn = el('button',{class:'btn-xs btn-xs-primary', text:'Save rule'});
  const skipBtn = el('button',{class:'btn-xs btn-xs-ghost', text:'Skip'});

  saveBtn.addEventListener('click', async () => {
    const keyword = kw.value.trim().toLowerCase();
    if(!keyword) return;
    bar.innerHTML = '<p style="color:var(--dim)">Saving rule…</p>';
    try {
      await api('saveRule', { keyword, category: newCat });
      // Add to local state
      const existing = state.rules.findIndex(r => r.keyword === keyword);
      if(existing >= 0) state.rules[existing].category = newCat;
      else state.rules.push({ keyword, category: newCat });
      bar.innerHTML = `<p style="color:var(--green)">✓ Rule saved — "${keyword}" → ${newCat}</p>`;
      setTimeout(() => bar.remove(), 2000);
    } catch(e) {
      bar.innerHTML = `<p style="color:var(--red)">Failed to save: ${e.message}</p>`;
    }
  });
  skipBtn.addEventListener('click', () => bar.remove());

  inputRow.append(kw, saveBtn, skipBtn);
  bar.appendChild(inputRow);
  lastPanel.parentNode.insertBefore(bar, lastPanel.nextSibling);
  setTimeout(() => kw.focus(), 50);
}

function commitSavingsTarget() {
  const v = parseFloat(state.editBudgetVal);
  if(!isNaN(v) && v >= 0) {
    state.savingsTarget = v;
    api('saveBudgets', { savingsTarget: v }).catch(()=>{});
  }
  state.editBudget = null;
  render();
}

function commitBudget(catName){
  const v=parseFloat(state.editBudgetVal);
  if(!isNaN(v)&&v>=0){
    state.budgets[catName]=v;
    api('saveBudgets', { budgets: state.budgets, freqs: state.freqs }).catch(()=>{});
  }
  state.editBudget=null;
  render();
}

// ════════════════════════════════════════════
//   DOM HELPER
// ════════════════════════════════════════════
function el(tag,props={}) {
  const e=document.createElement(tag);
  Object.entries(props).forEach(([k,v])=>{
    if(k==='text') e.textContent=v;
    else if(k==='class') e.className=v;
    else if(k==='style') e.style.cssText=v;
    else e[k]=v;
  });
  return e;
}

// (boot is handled by init() above)
</script>
</body>
</html>
